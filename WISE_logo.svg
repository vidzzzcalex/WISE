<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100" fill="none">
  <defs>
    <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#4B9EFF"/>
    </linearGradient>
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C9B1"/>
      <stop offset="100%" stop-color="#4B9EFF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon mark: abstract W spark / neural node -->
  <g filter="url(#glow)">
    <!-- Outer ring arc -->
    <circle cx="44" cy="50" r="30" stroke="url(#grad-accent)" stroke-width="2" stroke-dasharray="120 70" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Inner ring -->
    <circle cx="44" cy="50" r="20" stroke="url(#grad-teal)" stroke-width="1.5" stroke-dasharray="80 50" stroke-linecap="round" fill="none" opacity="0.5"/>
    <!-- Central dot -->
    <circle cx="44" cy="50" r="5" fill="url(#grad-accent)"/>
    <!-- Spoke lines -->
    <line x1="44" y1="30" x2="44" y2="22" stroke="url(#grad-accent)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="60.6" y1="40" x2="67.2" y2="36" stroke="url(#grad-teal)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="60.6" y1="60" x2="67.2" y2="64" stroke="url(#grad-accent)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="44" y1="70" x2="44" y2="78" stroke="url(#grad-teal)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="27.4" y1="60" x2="20.8" y2="64" stroke="url(#grad-accent)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="27.4" y1="40" x2="20.8" y2="36" stroke="url(#grad-teal)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Node dots at spoke ends -->
    <circle cx="44" cy="21" r="2.5" fill="#7C5CFC" opacity="0.9"/>
    <circle cx="68" cy="35" r="2" fill="#4B9EFF" opacity="0.8"/>
    <circle cx="68" cy="65" r="2" fill="#7C5CFC" opacity="0.7"/>
    <circle cx="44" cy="79" r="2" fill="#00C9B1" opacity="0.8"/>
    <circle cx="20" cy="65" r="2" fill="#4B9EFF" opacity="0.6"/>
    <circle cx="20" cy="35" r="2" fill="#00C9B1" opacity="0.6"/>
  </g>

  <!-- Wordmark: WISE -->
  <text
    x="92"
    y="64"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="46"
    font-weight="800"
    letter-spacing="6"
    fill="url(#grad-accent)"
    filter="url(#glow)"
  >WISE</text>

  <!-- Tagline -->
  <text
    x="94"
    y="82"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="3.5"
    fill="#A0A8C0"
    opacity="0.75"
  >WORKFORCE INTELLIGENCE</text>
</svg>
